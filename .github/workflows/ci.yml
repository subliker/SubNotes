name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # macOS 26 (Tahoe) runner — needed for the Liquid Glass SDK (glassEffect,
    # GlassEffectContainer, .buttonStyle(.glass)). The project targets macOS 26
    # with no back-compat, so an older Xcode/SDK cannot compile it.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          sudo xcode-select -s "${XCODE:-/Applications/Xcode.app}"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Test CalendarCore package
        working-directory: Packages/CalendarCore
        run: swift test

      - name: Build app
        run: |
          xcodebuild \
            -project SubNotes.xcodeproj \
            -scheme SubNotes \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
