name: Release

# Tag-driven release: push a `vX.Y.Z` tag → unsigned .dmg on GitHub Releases.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build-and-release:
    # Same macOS 26 (Tahoe) runner as CI — the Liquid Glass SDK needs it.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          sudo xcode-select -s "${XCODE:-/Applications/Xcode.app}"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build SubNotes.app (Release, unsigned)
        run: |
          xcodebuild \
            -project SubNotes.xcodeproj \
            -scheme SubNotes \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .dmg
        run: |
          APP="build/Build/Products/Release/SubNotes.app"
          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          # Drag-to-install affordance.
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "SubNotes" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "SubNotes-${GITHUB_REF_NAME}.dmg"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "SubNotes-${GITHUB_REF_NAME}.dmg" \
            --title "SubNotes ${GITHUB_REF_NAME}" \
            --generate-notes
